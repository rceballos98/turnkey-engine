services:
  - type: web
    name: turnkey-engine-api
    runtime: python
    plan: starter
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH="$HOME/.local/bin:$PATH" && uv sync --frozen --no-dev
    preDeployCommand: .venv/bin/alembic upgrade head
    startCommand: .venv/bin/gunicorn app.main:app -c gunicorn.conf.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: BROWSERLESS_URL
        sync: false
      - key: BROWSERLESS_TOKEN
        sync: false
      - key: BASE_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: REPORT_PRICE_CENTS
        value: "2500"

  - type: worker
    name: turnkey-engine-worker
    runtime: python
    plan: starter
    buildCommand: curl -LsSf https://astral.sh/uv/install.sh | sh && export PATH="$HOME/.local/bin:$PATH" && uv sync --frozen --no-dev
    startCommand: .venv/bin/python -m app.worker
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: INTERNAL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FIRECRAWL_API_KEY
        sync: false
      - key: BROWSERLESS_URL
        sync: false
      - key: BROWSERLESS_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PDF_DIR
        value: /data/pdfs
